<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xenon Wallet</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- =============================================
       ONBOARDING SCREEN
       ============================================= -->
  <div id="onboarding-screen">
    <div class="ob-inner">
      <div class="ob-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <path d="M18 3L33 12V24L18 33L3 24V12L18 3Z" stroke="white" stroke-width="2" fill="none"/>
          <path d="M18 3L33 12V24L18 33L3 24V12L18 3Z" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
          <circle cx="18" cy="18" r="5" fill="white"/>
        </svg>
      </div>
      <h1 class="ob-title">Xenon</h1>
      <p class="ob-sub">Your Solana Devnet wallet</p>
      <button id="generate-wallet-btn" class="ob-btn">Create Wallet</button>
      <span class="ob-note">Devnet · No real funds</span>
    </div>
  </div>

  <!-- =============================================
       MAIN WALLET SCREEN
       ============================================= -->
  <div id="wallet-screen" style="display:none;">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <svg width="18" height="18" viewBox="0 0 36 36" fill="none">
          <path d="M18 3L33 12V24L18 33L3 24V12L18 3Z" stroke="white" stroke-width="2.5" fill="none"/>
          <circle cx="18" cy="18" r="4" fill="white"/>
        </svg>
        <span class="topbar-name">Xenon</span>
      </div>
      <span class="topbar-badge">Devnet</span>
    </div>

    <!-- Balance hero area -->
    <div class="hero">
      <p class="hero-label">Total Balance</p>
      <p class="hero-balance">
        <span class="hero-sol" id="balance-amount">--</span>
        <span class="hero-unit">SOL</span>
      </p>
      <!-- Address pill -->
      <div class="address-pill">
        <span id="wallet-address-short">Loading...</span>
        <button id="copy-address-btn" class="pill-copy-btn">Copy</button>
      </div>
      <!-- Hidden full address for clipboard -->
      <input type="text" id="wallet-address" readonly style="position:absolute;opacity:0;pointer-events:none;width:0;">
    </div>

    <!-- Action buttons: Send / Refresh -->
    <div class="actions">
      <div class="action-item" id="open-send-btn">
        <div class="action-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
          </svg>
        </div>
        <span>Send</span>
      </div>
      <div class="action-item" id="refresh-balance-btn">
        <div class="action-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </div>
        <span>Refresh</span>
      </div>
    </div>

    <!-- Send panel (hidden until Send is clicked) -->
    <div id="send-panel" class="send-panel" style="display:none;">
      <div class="send-panel-header">
        <button id="close-send-btn" class="back-btn">&#8592; Back</button>
        <span>Send SOL</span>
        <span></span>
      </div>
      <div class="send-body">
        <label>Recipient Address</label>
        <input type="text" id="recipient-address" placeholder="Paste wallet address">
        <label>Amount (SOL)</label>
        <input type="number" id="send-amount" placeholder="0.00" step="0.001" min="0">
        <button id="send-sol-btn" class="send-btn">Send SOL</button>
        <div id="status-message"></div>
      </div>
    </div>

    <!-- Main content (hidden when send panel is open) -->
    <div id="main-content">
      <!-- Recent transactions -->
      <div class="section-header">
        <span class="section-title">Recent Activity</span>
      </div>
      <ul id="tx-list">
        <li class="tx-empty">Loading transactions...</li>
      </ul>
    </div>

  </div>

  <script src="solana-web3.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
